name: Bug report
description: Report a problem with card generation, layout, assets, or output files.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or prompt
      description: Paste the command or user prompt you used.
  - type: textarea
    id: output
    attributes:
      label: Output files or screenshots
      description: Attach screenshots or list generated files if useful.

