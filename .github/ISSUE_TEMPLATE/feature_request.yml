name: Feature request
description: Suggest a new theme, stage, layout, asset, or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What would you like this Skill to support?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content library
        - Visual assets
        - Layout
        - Parent workflow
        - GitHub documentation
        - Other

